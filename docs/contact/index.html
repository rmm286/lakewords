<body>
<header class="site-header">
  <button class="menu-toggle" data-menu-toggle aria-expanded="false" aria-controls="site-nav">menu</button>

<main>
<section class="container page-hero"><h1>contact</h1></section>
<section class="container" style="padding-bottom:3rem;">
  <p>we'd love to hear from you, and connect with others doing work around the lake.</p>
  <form data-endpoint="https://httpbin.org/post">
    <div class="columns" style="grid-template-columns:1fr 1fr;gap:.8rem;">
      <div><label for="name" class="small">Name (required)</label><input id="name" name="name" required /></div>
      <div><label for="email" class="small">Email</label><input id="email" name="email" type="email" /></div>
    </div>
    <p><label for="message" class="small">Message (required)</label><textarea id="message" name="message" required></textarea></p>
    <button class="button inverse" type="submit">Submit</button>
    <p class="small" data-form-status></p>
  </form>
</section>
</main>
